name: Deploy Frontend → Railway

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/deploy-frontend.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Railway deploy triggered
        run: |
          echo "Railway deploys automatically from GitHub integration."
          echo "Monitor at: https://railway.app/dashboard"
          echo "Commit: ${{ github.sha }}"
