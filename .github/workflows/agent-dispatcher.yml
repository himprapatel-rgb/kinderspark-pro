name: 🤝 Agent Dispatcher — Real-time Task Routing

on:
  schedule:
    - cron: '*/15 * * * *'   # Every 15 minutes
  workflow_dispatch:

permissions:
  contents: read
  actions: write    # Required to trigger other workflows

jobs:
  dispatch:
    name: Check Inboxes & Route Tasks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Fetch all pending agent conversations
        id: inbox
        run: |
          BACKEND="${{ secrets.BACKEND_URL }}"
          SECRET="${{ secrets.AGENT_SECRET }}"

          if [ -z "$BACKEND" ] || [ -z "$SECRET" ]; then
            echo "Missing BACKEND_URL or AGENT_SECRET — skipping"
            exit 0
          fi

          # Get all unresolved conversations
          CONVS=$(curl -sf --max-time 10 \
            -H "x-agent-secret: $SECRET" \
            "$BACKEND/api/agents/conversations" 2>/dev/null || echo "[]")

          echo "conversations<<EOF" >> $GITHUB_OUTPUT
          echo "$CONVS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          COUNT=$(echo "$CONVS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len([x for x in d if not x.get('resolved',True)]))" 2>/dev/null || echo "0")
          echo "pending_count=$COUNT" >> $GITHUB_OUTPUT
          echo "📬 Pending messages: $COUNT"
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}

      - name: 🚀 Trigger agents with pending tasks
        if: steps.inbox.outputs.pending_count != '0'
        run: |
          CONVS='${{ steps.inbox.outputs.conversations }}'
          SECRET="${{ secrets.AGENT_SECRET }}"
          BACKEND="${{ secrets.BACKEND_URL }}"

          python3 << 'PYEOF'
          import json, os, subprocess, sys

          # Map agent-id → workflow filename
          AGENT_WORKFLOWS = {
            "health-monitor":        "health-monitor.yml",
            "auto-dev":              "claude-agent.yml",
            "frontend-designer":     "agent-frontend.yml",
            "backend-engineer":      "agent-backend.yml",
            "database-agent":        "agent-database.yml",
            "weekly-improvement":    "weekly-improvement.yml",
            "security-auditor":      "agent-security-auditor.yml",
            "child-safety":          "agent-child-safety.yml",
            "dependency-updater":    "agent-dependency-updater.yml",
            "secret-scanner":        "agent-secret-scanner.yml",
            "gdpr-agent":            "agent-gdpr.yml",
            "pr-reviewer":           "agent-pr-reviewer.yml",
            "test-generator":        "agent-test-generator.yml",
            "performance-auditor":   "agent-performance-auditor.yml",
            "accessibility":         "agent-accessibility.yml",
            "curriculum-builder":    "agent-curriculum-builder.yml",
            "difficulty-calibrator": "agent-difficulty-calibrator.yml",
            "badge-designer":        "agent-badge-designer.yml",
            "mini-game-developer":   "agent-mini-game-developer.yml",
            "seasonal-content":      "agent-seasonal-content.yml",
            "analytics-reporter":    "agent-analytics-reporter.yml",
            "churn-detector":        "agent-churn-detector.yml",
            "trend-analyser":        "agent-trend-analyser.yml",
            "ab-testing":            "agent-ab-testing.yml",
            "parent-report":         "agent-parent-report.yml",
            "teacher-insight":       "agent-teacher-insight.yml",
            "achievement-notifier":  "agent-achievement-notifier.yml",
            "support-agent":         "agent-support.yml",
            "onboarding-watcher":    "agent-onboarding-watcher.yml",
            "marketing-agent":       "agent-marketing.yml",
            "localization-agent":    "agent-localization.yml",
            "seo-agent":             "agent-seo.yml",
            "launch-agent":          "agent-launch.yml",
            "cost-monitor":          "agent-cost-monitor.yml",
            "backup-verifier":       "agent-backup-verifier.yml",
            "api-latency":           "agent-api-latency.yml",
            "log-analyser":          "agent-log-analyser.yml",
            "theme-designer":        "agent-theme-designer.yml",
            "pwa-agent":             "agent-pwa.yml",
            "colour-accessibility":  "agent-colour-accessibility.yml",
          }

          convs_raw = os.environ.get("CONVS_JSON", "[]")
          try:
            convs = json.loads(convs_raw)
          except:
            print("Failed to parse conversations JSON")
            sys.exit(0)

          # Group unresolved messages by target agent
          pending = {}
          for c in convs:
            if c.get("resolved"):
              continue
            to_id = c.get("toAgentId", "")
            if to_id == "all":
              # Broadcast — queue for all agents
              for aid in AGENT_WORKFLOWS:
                pending.setdefault(aid, []).append(c)
            else:
              pending.setdefault(to_id, []).append(c)

          if not pending:
            print("No pending tasks to dispatch")
            sys.exit(0)

          triggered = []
          for agent_id, messages in pending.items():
            workflow = AGENT_WORKFLOWS.get(agent_id)
            if not workflow:
              print(f"No workflow found for agent: {agent_id}")
              continue

            # Build task summary
            task_lines = []
            for m in messages[:5]:  # cap at 5 per agent
              from_name = m.get("fromName", m.get("fromAgentId", "Unknown"))
              msg_type  = m.get("msgType", "message")
              content   = m.get("message", "")[:200]
              conv_id   = m.get("id", "")
              task_lines.append(f"[{msg_type.upper()} from {from_name}]: {content} (conv_id:{conv_id})")

            task_str = "\n".join(task_lines)
            from_agents = list(set(m.get("fromName", "?") for m in messages))

            print(f"\n🚀 Triggering {agent_id} ({workflow}) — {len(messages)} pending message(s) from {from_agents}")

            result = subprocess.run([
              "gh", "workflow", "run", workflow,
              "--field", f"task=AGENT TASK ASSIGNED:\n{task_str}",
              "--field", f"triggered_by={', '.join(from_agents)}",
            ], capture_output=True, text=True)

            if result.returncode == 0:
              print(f"  ✅ Triggered successfully")
              triggered.append(agent_id)
            else:
              print(f"  ❌ Failed: {result.stderr.strip()}")

          print(f"\n📊 Dispatched {len(triggered)} agents: {triggered}")
          PYEOF
        env:
          CONVS_JSON: ${{ steps.inbox.outputs.conversations }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Log dispatch run
        if: always()
        run: |
          node monitoring/agent-memory.js write health-monitor \
            "action" 1 "Dispatcher ran $(date +%Y-%m-%d\ %H:%M). Pending: ${{ steps.inbox.outputs.pending_count }} messages." 2>/dev/null || true
        env:
          BACKEND_URL:  ${{ secrets.BACKEND_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
