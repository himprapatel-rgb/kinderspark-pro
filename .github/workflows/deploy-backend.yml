name: Deploy Backend → Railway

on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/deploy-backend.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Debug Railway CLI version
        run: railway --version
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: List Railway projects
        run: railway list || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Backend to Railway
        run: |
          railway up \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment ${{ secrets.RAILWAY_ENVIRONMENT_ID }} \
            --service kinderspark-backend \
            --detach \
            --verbose
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run DB migrations
        run: |
          railway run \
            --project ${{ secrets.RAILWAY_PROJECT_ID }} \
            --environment ${{ secrets.RAILWAY_ENVIRONMENT_ID }} \
            --service kinderspark-backend \
            -- npx prisma migrate deploy || true
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
