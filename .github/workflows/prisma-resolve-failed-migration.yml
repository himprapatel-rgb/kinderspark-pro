# Run from Actions → "Prisma — resolve failed migration" when migrate deploy
# hits P3009/P3018 (failed migration or duplicate column after db push).
#
# 1) Optional: resolves the workflow inputs migration if it is unfinished
#    (finished_at IS NULL): --applied if table exists, else --rolled-back.
# 2) Profile: if Student + ParentProfile already have the profile-migration
#    columns (e.g. after db push), marks 20260330_profile_contact_fields
#    applied (idempotent; ignores P3008).
# 3) Runs prisma migrate deploy.
#
# Requires repo secret: DATABASE_URL (production PostgreSQL URL).

name: Prisma — resolve failed migration

on:
  workflow_dispatch:
    inputs:
      migration_name:
        description: 'Folder name under prisma/migrations (e.g. 20260330_ai_spark_artifact)'
        required: true
        default: '20260330_ai_spark_artifact'
      table_name:
        description: 'PostgreSQL table created by that migration (unquoted name)'
        required: true
        default: 'AiSparkArtifact'

jobs:
  resolve-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install psql
        run: |
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client

      - name: Resolve stuck migrations then apply pending
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MIGRATION_NAME: ${{ github.event.inputs.migration_name }}
          TABLE_NAME: ${{ github.event.inputs.table_name }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "❌ DATABASE_URL secret is not set."
            exit 1
          fi

          failed_unfinished() {
            local name="$1"
            psql "$DATABASE_URL" -tAc "SELECT EXISTS (SELECT 1 FROM \"_prisma_migrations\" WHERE migration_name = '$name' AND finished_at IS NULL);"
          }

          # Idempotent: Prisma may return P3008 if the row is already applied.
          resolve_applied_ok() {
            local name="$1"
            local out rc
            set +e
            out=$(npx prisma migrate resolve --applied "$name" 2>&1)
            rc=$?
            set -e
            echo "$out"
            if [ "$rc" -eq 0 ]; then return 0; fi
            if echo "$out" | grep -qE 'P3008|already recorded as applied'; then return 0; fi
            return "$rc"
          }

          resolve_rolled_back_ok() {
            local name="$1"
            local out rc
            set +e
            out=$(npx prisma migrate resolve --rolled-back "$name" 2>&1)
            rc=$?
            set -e
            echo "$out"
            if [ "$rc" -eq 0 ]; then return 0; fi
            if echo "$out" | grep -qE 'P3011|not found|already'; then return 0; fi
            return "$rc"
          }

          # User-configured migration (default: ai spark artifact)
          UNFIN=$(failed_unfinished "$MIGRATION_NAME" | tr -d '[:space:]')
          if [ "$UNFIN" = "t" ]; then
            EXISTS=$(psql "$DATABASE_URL" -tAc "SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema = 'public' AND table_name = '$TABLE_NAME');")
            echo "Unfinished migration $MIGRATION_NAME — table $TABLE_NAME exists: $EXISTS"
            if [ "$EXISTS" = "t" ]; then
              resolve_applied_ok "$MIGRATION_NAME"
            else
              resolve_rolled_back_ok "$MIGRATION_NAME"
            fi
          else
            echo "No unfinished row for $MIGRATION_NAME (skip generic resolve)."
          fi

          # Profile v1: duplicate-column failures when schema already matches migration SQL
          STU=$(psql "$DATABASE_URL" -tAc "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'public' AND table_name = 'Student' AND column_name IN ('preferredName','photoUrl','addressLine1','addressLine2','city','state','postalCode','country','parentName','parentPhone','emergencyPhone','notes');")
          PAR=$(psql "$DATABASE_URL" -tAc "SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = 'public' AND table_name = 'ParentProfile' AND column_name IN ('phone','alternatePhone','addressLine1','addressLine2','city','state','postalCode','country','photoUrl');")
          PROF_UNFIN=$(failed_unfinished "20260330_profile_contact_fields" | tr -d '[:space:]')
          echo "Profile columns: Student=$STU/12, ParentProfile=$PAR/9 (unfinished row: $PROF_UNFIN)"
          if [ "$PROF_UNFIN" = "t" ] && { [ "$STU" -ne 12 ] || [ "$PAR" -ne 9 ]; }; then
            echo "⚠️ 20260330_profile_contact_fields is unfinished but columns are incomplete. Fix manually."
            exit 1
          fi
          if [ "$STU" -eq 12 ] && [ "$PAR" -eq 9 ]; then
            echo "→ Ensure 20260330_profile_contact_fields is marked applied (schema matches)."
            resolve_applied_ok 20260330_profile_contact_fields
          fi

          echo "→ prisma migrate deploy"
          npx prisma migrate deploy

      - name: Summary
        env:
          MIGRATION_NAME: ${{ github.event.inputs.migration_name }}
          TABLE_NAME: ${{ github.event.inputs.table_name }}
        run: |
          echo "## Prisma migration repair" >> "$GITHUB_STEP_SUMMARY"
          echo "Checked \`$MIGRATION_NAME\` / \`$TABLE_NAME\`, profile field counts, then \`migrate deploy\`." >> "$GITHUB_STEP_SUMMARY"
