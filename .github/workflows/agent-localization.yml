name: 🌍 Multilingual AI Agent

on:
  schedule:
    - cron: '0 4 * * 0'
  push:
    paths:
      - 'translations/master.json'
      - 'frontend/lib/i18n.ts'
      - 'frontend/lib/modules.ts'
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      task:
        description: 'Specific translation task (leave blank for full sync)'
        required: false
        default: ''
      add_language:
        description: 'Add a new language code (e.g. ja, ko, id, bn)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  multilingual-agent:
    name: Multilingual AI Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      contains(github.event.label.name, 'i18n') ||
      contains(github.event.label.name, 'localization') ||
      contains(github.event.label.name, 'translation')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name  "KinderSpark i18n Agent"
          git config user.email "i18n@kinderspark.ai"
          git checkout -b "claude/i18n-$(date +%s)"

      - name: Run Multilingual AI Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          max_turns: "40"
          task: |
            You are the MULTILINGUAL AI AGENT for KinderSpark Pro.
            Your job: keep ALL translations perfectly in sync across Web, iOS, and Android.

            TODAY: Run `date` to get current date.
            MANUAL TASK: "${{ github.event.inputs.task }}"
            ADD LANGUAGE: "${{ github.event.inputs.add_language }}"

            ## STEP 1 — Audit translations/master.json
            Read translations/master.json.
            Run: node translations/sync.js --check
            Note any missing translation keys.

            ## STEP 2 — Scan for new untranslated strings
            Search for hardcoded English strings in frontend pages that should use t():
            Run: grep -rn "\"[A-Z][a-z]" frontend/app/ --include="*.tsx" | grep -v "import\|//\|t(\|className\|href\|src\|type\|key=" | head -30
            Identify strings that should be translation keys but are hardcoded.

            ## STEP 3 — Fill ALL missing translations using Claude AI
            For every key missing a translation in master.json, generate the correct translation.
            Rules:
            - Child education app — keep language simple, age-appropriate (children 4-10)
            - Encouraging, positive, joyful tone
            - Keep emojis exactly as-is
            - RTL languages (ar, ur): ensure natural right-to-left phrasing
            - Hindi/Chinese: common everyday vocabulary, not formal/academic
            Update translations/master.json with all missing values.

            ## STEP 4 — Add new language if requested
            If ADD LANGUAGE is set (e.g. "ja"):
            1. Add language to _meta.languages array in master.json
            2. Add to _meta.rtlLanguages if it is RTL
            3. Translate ALL existing keys to the new language
            4. Update sync.js with the new language name and flag emoji

            ## STEP 5 — Sync all platforms
            Run: node translations/sync.js
            This generates:
            - frontend/lib/i18n.ts (Web / Next.js)
            - translations/ios/*/Localizable.strings (iOS)
            - translations/android/*/strings.xml (Android)
            Confirm output shows no errors.

            ## STEP 6 — Update database language support
            Read backend/prisma/schema.prisma.
            The Student model has a settings object. Check if language codes need updating.
            Read frontend/store/appStore.ts to see the settings.lang field.
            If the app only accepts old language codes (en|fr|es|ar|ur), update validation
            in backend/src/routes/student.routes.ts to accept the full new language list.

            ## STEP 7 — Update frontend language selector
            Read frontend/app/child/settings/page.tsx.
            Ensure the language picker displays ALL languages from i18n.ts LOCALES array.
            If languages are missing from the UI, add them to the selector.

            ## STEP 8 — Verify RTL support
            Read frontend/app/layout.tsx and frontend/app/child/layout.tsx.
            RTL languages (ar, ur) require dir="rtl" on the html/body element.
            If RTL switching is missing or incomplete, add it:
            - Read settings.lang from Zustand store
            - Apply dir="rtl" when lang is "ar" or "ur"

            ## STEP 9 — Commit and push ALL changes
            Stage all modified files.
            Commit: git add translations/ frontend/lib/i18n.ts frontend/app/child/settings/page.tsx && git commit -m "i18n: sync all translations — web + iOS + Android [auto $(date +%Y-%m-%d)]"
            Push: git push -u origin HEAD

      - name: Push if changes exist
        run: git diff --quiet && git diff --staged --quiet || git push -u origin HEAD || true
