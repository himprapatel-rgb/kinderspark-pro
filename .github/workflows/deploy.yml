name: Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Type-check & build backend
  # ─────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 2: Type-check & build frontend
  # ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─────────────────────────────────────────
  # JOB 3: Run DB migrations on Railway
  # ─────────────────────────────────────────
  migrate:
    name: Prisma Migrate Deploy
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Migration summary
        run: |
          echo "## ✅ DB Migrations Applied" >> $GITHUB_STEP_SUMMARY
          echo "All pending Prisma migrations deployed to production." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # JOB 4: Deploy backend to Railway
  # ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: [build-backend, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Monorepo: run from backend/ so Railway uses backend/Dockerfile + railway.json
      - name: Deploy backend service
        run: |
          railway up \
            --service kinderspark-backend \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 5: Deploy frontend to Railway
  # ─────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Railway
    runs-on: ubuntu-latest
    # Wait for DB migrations so a failed migrate does not leave frontend-only deploys.
    needs: [build-frontend, migrate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # Monorepo: run from frontend/ so Railway uses frontend/Dockerfile + NEXT build context
      - name: Deploy frontend service
        run: |
          railway up \
            --service kinderspark-pro \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 6: Confirm deployment URLs
  # ─────────────────────────────────────────
  confirm:
    name: Confirm Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Show deployment status
        run: railway status
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Health check backend
        run: |
          echo "Waiting for backend to be ready..."
          sleep 30
          curl -f ${{ secrets.BACKEND_URL }}/health || echo "Health check will pass once fully deployed"

      - name: Summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Frontend | ${{ secrets.FRONTEND_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚙️ Backend  | ${{ secrets.BACKEND_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Login PINs" >> $GITHUB_STEP_SUMMARY
          echo "- Teacher: \`1234\`" >> $GITHUB_STEP_SUMMARY
          echo "- Admin: \`9999\`" >> $GITHUB_STEP_SUMMARY
          echo "- Students: \`1111\` / \`2222\` / \`3333\` / \`4444\` / \`5555\`" >> $GITHUB_STEP_SUMMARY
