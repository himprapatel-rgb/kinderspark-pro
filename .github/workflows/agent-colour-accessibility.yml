name: 🌈 Colour Accessibility Agent

on:
  schedule:
    - cron: '0 6 * * 4'  # Every Thursday
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  colour-a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, token: '${{ secrets.GITHUB_TOKEN }}' }

      - name: Check contrast ratios
        run: |
          node -e "
          // WCAG contrast ratio calculator
          function luminance(r, g, b) {
            const [rs, gs, bs] = [r, g, b].map(c => {
              c /= 255;
              return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
            });
            return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
          }
          function contrast(hex1, hex2) {
            const parse = h => {
              const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
              return luminance(r,g,b);
            };
            const l1 = parse(hex1), l2 = parse(hex2);
            return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);
          }
          // Theme colors vs dark backgrounds
          const themes = [
            ['#8b1cf7','#1a0a2e'], // default purple on bg
            ['#5856D6','#0a1a2e'], // ocean on bg
            ['#27AE7A','#0a1e12'], // forest on bg
            ['#FF6B35','#1e100a'], // sunset on bg
            ['#FF2D55','#1e0a12'], // rose on bg
          ];
          themes.forEach(([fg, bg]) => {
            const r = contrast(fg, bg);
            const pass = r >= 3 ? '✅' : '❌';
            console.log(pass + ' ' + fg + ' on ' + bg + ': ' + r.toFixed(2) + ':1');
          });
          " || echo "Node contrast check done"

      - name: Configure git
        run: |
          git config user.name "KinderSpark Colour Agent"
          git config user.email "colour@kinderspark.ai"
          git checkout -b "claude/colour-$(date +%s)"

      - name: Run Colour Accessibility Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          task: |
            You are the COLOUR ACCESSIBILITY AGENT for KinderSpark Pro.
            Children, including those with colour blindness or visual impairments, use this app.

            WCAG AA Requirements:
            - Normal text (< 18pt): contrast ratio ≥ 4.5:1
            - Large text (≥ 18pt bold): contrast ratio ≥ 3:1
            - UI components/icons: contrast ratio ≥ 3:1

            YOUR TASKS:

            1. **Theme Colour Audit**: Read frontend/app/child/layout.tsx
               For each theme (th_def, th_ocean, etc.), calculate if:
               - The theme color is readable on dark backgrounds
               - White text on theme-colored buttons has enough contrast
               - Dim text (text-white/40, rgba(255,255,255,0.4)) is readable for important info

            2. **Problem Areas to Check**:
               - "Rankings" list dim secondary text (text-white/40)
               - Tab bar inactive icons (text-white/30)
               - Placeholder text in forms
               - Badge shelf emoji label text
               - Leaderboard rank numbers

            3. **Colour Blindness**: The app uses red/green heavily for correct/wrong feedback.
               Add a secondary indicator that isn't colour-dependent:
               - Correct: ✓ icon + green (not just green)
               - Wrong: ✗ icon + red (not just red)
               - Add pattern/icon differentiation for colour-blind users

            4. **High Contrast Mode**: Add a toggle in child settings for high contrast mode
               that increases text opacity from 0.4/0.3 to 0.7/0.6 for dim text.

            Fix issues directly. Commit with "a11y: improve colour contrast and colour-blind support".
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          max_turns: "20"

      - run: git push -u origin HEAD 2>/dev/null || true
