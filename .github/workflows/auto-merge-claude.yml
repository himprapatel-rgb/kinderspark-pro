name: Auto-merge Claude branches → main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Merge to main
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge into main
        run: |
          git fetch origin main
          git checkout main
          git merge origin/${{ github.ref_name }} \
            --no-ff \
            -m "chore: auto-merge ${{ github.ref_name }} into main [skip ci]"
          git push origin main

      - name: Summary
        run: |
          echo "## ✅ Auto-merged into main" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`$(git rev-parse HEAD)\`" >> $GITHUB_STEP_SUMMARY
