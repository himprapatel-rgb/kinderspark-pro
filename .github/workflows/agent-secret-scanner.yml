name: 🔑 Secret Scanner Agent

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    - cron: '0 1 * * *'  # Daily at 01:00 UTC
  workflow_dispatch:
    inputs:
      triggered_by:
        description: "Agent that assigned this task"
        required: false
        default: ""
      agent_task:
        description: "Task assigned by another agent"
        required: false
        default: ""

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }


      - name: 🧠 Load memory
        id: memory
        run: |
          node monitoring/agent-memory.js read secret-scanner 2>/dev/null || true
        env:
          BACKEND_URL:  ${{ secrets.BACKEND_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}

      - name: Scan for secrets with trufflehog
        id: trufflehog
        run: |
          docker run --rm -v "$PWD:/pwd" trufflesecurity/trufflehog:latest \
            filesystem /pwd \
            --only-verified \
            --json 2>/dev/null | head -50 > /tmp/secrets.json || true
          cat /tmp/secrets.json
          COUNT=$(wc -l < /tmp/secrets.json || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Scan for common secret patterns
        id: patterns
        run: |
          PATTERNS=(
            "sk-ant-[a-zA-Z0-9]+"
            "ghp_[a-zA-Z0-9]+"
            "AKIA[A-Z0-9]{16}"
            "password\s*=\s*['\"][^'\"]{4,}"
            "secret\s*=\s*['\"][^'\"]{8,}"
            "DATABASE_URL\s*=\s*postgresql"
          )
          FOUND=""
          for p in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
              --include="*.json" --include="*.env*" \
              -E "$p" . \
              --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              FOUND="$FOUND\nPattern: $p\n$MATCHES\n"
            fi
          done
          if [ -n "$FOUND" ]; then
            echo "SECRETS FOUND!"
            echo -e "$FOUND"
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "No patterns matched."
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Alert on findings
        if: steps.patterns.outputs.found == 'true' || steps.trufflehog.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [Security] Potential secrets detected in codebase — ${new Date().toISOString().slice(0,10)}`,
              labels: ['security', 'critical', 'agent-auto'],
              body: `## 🔑 Secret Scanner Alert\n\nThe secret scanner has detected potential hardcoded secrets or credentials.\n\n**Immediate action required:**\n1. Review the scan results in the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n2. Rotate any exposed credentials immediately\n3. Remove secrets from code and use environment variables\n4. Check git history — if secret was committed, it must be removed from history\n\n*Auto-created by Secret Scanner Agent*`,
            })

      - name: 🧠 Save memory
        if: always()
        run: |
          FOUND="${{ steps.patterns.outputs.found }}"
          if [ "$FOUND" = "true" ]; then
            node monitoring/agent-memory.js write secret-scanner \
              "finding" 4 "CRITICAL: Potential secrets found in codebase on $(date +%Y-%m-%d). Alert issued." 2>/dev/null || true
          else
            node monitoring/agent-memory.js write secret-scanner \
              "observation" 1 "Secret scan passed $(date +%Y-%m-%d). No secrets detected." 2>/dev/null || true
          fi
        env:
          BACKEND_URL:  ${{ secrets.BACKEND_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
