services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kinderspark
      POSTGRES_PASSWORD: kinderspark
      POSTGRES_DB: kinderspark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "4000:4000"

volumes:
  pgdata:
