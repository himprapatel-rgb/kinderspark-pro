<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C3CE6"/>
      <stop offset="45%" stop-color="#5B4FE8"/>
      <stop offset="100%" stop-color="#4A7CF7"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0E6D4"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD4A8"/>
      <stop offset="100%" stop-color="#FFBE8A"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C3D1E"/>
      <stop offset="100%" stop-color="#3D2712"/>
    </linearGradient>
    <filter id="sparkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20.48" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5.12" stdDeviation="10.24" flood-color="#00000030"/>
    </filter>
    <filter id="twinkle">
      <feGaussianBlur stdDeviation="5.12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect x="61.44" y="61.44" width="901.12" height="901.12" rx="225.28" fill="url(#bg)"/>
  
  <!-- Open Book -->
  <g transform="translate(512, 696.32)">
    <ellipse cx="0" cy="51.2" rx="327.68" ry="30.72" fill="rgba(0,0,0,0.15)"/>
    <path d="M-10.24,-10.24 C-40.96,-143.36 -122.88,-194.56 -307.2,-174.08 L-307.2,40.96 C-122.88,20.48 -40.96,61.44 -10.24,40.96 Z"
          fill="url(#pageGrad)" opacity="0.95"/>
    <path d="M10.24,-10.24 C40.96,-143.36 122.88,-194.56 307.2,-174.08 L307.2,40.96 C122.88,20.48 40.96,61.44 10.24,40.96 Z"
          fill="url(#pageGrad)" opacity="0.9"/>
    <line x1="0" y1="-10.24" x2="0" y2="40.96" stroke="#D4B896" stroke-width="4.096" opacity="0.6"/>
    <g opacity="0.2" stroke="#8B7355" stroke-width="2.048" stroke-linecap="round">
      <line x1="-256" y1="-102.4" x2="-61.44" y2="-71.68"/>
      <line x1="-245.76" y1="-61.44" x2="-51.2" y2="-30.72"/>
      <line x1="-235.52" y1="-20.48" x2="-40.96" y2="5.12"/>
    </g>
    <g opacity="0.2" stroke="#8B7355" stroke-width="2.048" stroke-linecap="round">
      <line x1="61.44" y1="-71.68" x2="256" y2="-102.4"/>
      <line x1="51.2" y1="-30.72" x2="245.76" y2="-61.44"/>
      <line x1="40.96" y1="5.12" x2="235.52" y2="-20.48"/>
    </g>
  </g>
  
  <!-- Child -->
  <g transform="translate(512, 471.04)" filter="url(#softShadow)">
    <ellipse cx="0" cy="-20.48" rx="163.84" ry="174.08" fill="url(#hairGrad)"/>
    <ellipse cx="0" cy="30.72" rx="133.12" ry="133.12" fill="url(#skinGrad)"/>
    <path d="M-143.36,-30.72 Q-122.88,-163.84 -20.48,-163.84 Q61.44,-174.08 143.36,-61.44 Q102.4,-143.36 20.48,-143.36 Q-61.44,-143.36 -102.4,-112.64 Z"
          fill="url(#hairGrad)"/>
    <ellipse cx="-46.08" cy="10.24" rx="25.6" ry="30.72" fill="#2D1B0E"/>
    <ellipse cx="-40.96" cy="2.048" rx="9.216" ry="9.216" fill="white" opacity="0.9"/>
    <ellipse cx="46.08" cy="10.24" rx="25.6" ry="30.72" fill="#2D1B0E"/>
    <ellipse cx="51.2" cy="2.048" rx="9.216" ry="9.216" fill="white" opacity="0.9"/>
    <circle cx="-81.92" cy="61.44" r="25.6" fill="#FF9999" opacity="0.4"/>
    <circle cx="81.92" cy="61.44" r="25.6" fill="#FF9999" opacity="0.4"/>
    <path d="M-40.96,71.68 Q0,112.64 40.96,71.68" 
          fill="none" stroke="#C47A5A" stroke-width="6.144" stroke-linecap="round"/>
    <ellipse cx="0" cy="46.08" rx="10.24" ry="7.168" fill="#E8A878" opacity="0.6"/>
  </g>
  
  <!-- Golden Spark -->
  <g transform="translate(665.6, 307.2)" filter="url(#sparkGlow)">
    <path d="M0,-92.16 C15.36,-25.6 25.6,-15.36 71.68,0 C25.6,15.36 15.36,25.6 0,92.16 C-15.36,25.6 -25.6,15.36 -71.68,0 C-25.6,-15.36 -15.36,-25.6 0,-92.16Z"
          fill="url(#sparkGrad)"/>
    <circle cx="0" cy="0" r="20.48" fill="#FFFBE6" opacity="0.95"/>
  </g>
  
  <!-- Sparkles -->
  <g filter="url(#twinkle)">
    <g transform="translate(184.32, 184.32)">
      <path d="M0,-20.48 L5.12,0 L0,20.48 L-5.12,0 Z" fill="white" opacity="0.7"/>
      <path d="M-20.48,0 L0,5.12 L20.48,0 L0,-5.12 Z" fill="white" opacity="0.7"/>
    </g>
    <g transform="translate(798.72, 225.28)">
      <path d="M0,-15.36 L4.096,0 L0,15.36 L-4.096,0 Z" fill="white" opacity="0.5"/>
      <path d="M-15.36,0 L0,4.096 L15.36,0 L0,-4.096 Z" fill="white" opacity="0.5"/>
    </g>
    <g transform="translate(143.36, 430.08)">
      <path d="M0,-12.288 L3.072,0 L0,12.288 L-3.072,0 Z" fill="#FFD700" opacity="0.6"/>
      <path d="M-12.288,0 L0,3.072 L12.288,0 L0,-3.072 Z" fill="#FFD700" opacity="0.6"/>
    </g>
    <circle cx="768" cy="153.6" r="6.144" fill="white" opacity="0.4"/>
    <circle cx="225.28" cy="839.68" r="5.12" fill="white" opacity="0.3"/>
    <circle cx="819.2" cy="798.72" r="4.096" fill="white" opacity="0.25"/>
  </g>
  
  <!-- ABC on book -->
  <g transform="translate(512, 696.32)" opacity="0.25">
    <text x="-163.84" y="-81.92" font-family="Arial,sans-serif" font-weight="800" font-size="35.84" fill="#6B5B3E" text-anchor="middle">A</text>
    <text x="163.84" y="-81.92" font-family="Arial,sans-serif" font-weight="800" font-size="35.84" fill="#6B5B3E" text-anchor="middle">B</text>
  </g>
</svg>